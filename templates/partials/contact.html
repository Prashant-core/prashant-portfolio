<section class="contact section" id="contact">
  <div class="container">
    <div class="section-tag">get in touch</div>
    <h2 class="section-title">Let's <span class="gradient-text">Work Together</span></h2>
    <div class="contact-wrap">
      <div class="contact-left">
        <p class="contact-desc">Have a project in mind, a question, or just want to say hi? My inbox is always open.</p>

        <div class="contact-cards">

          <a href="mailto:{{ portfolio.email }}" class="contact-card glass-card">
            <div class="contact-card-icon" style="background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.3);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div class="contact-card-info">
              <div class="contact-card-label">Email</div>
              <div class="contact-card-value">{{ portfolio.email }}</div>
            </div>
            <button class="copy-email-btn" onclick="copyEmail(event, '{{ portfolio.email }}')" title="Copy email">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </button>
          </a>

          <a href="{{ portfolio.github }}" target="_blank" class="contact-card glass-card">
            <div class="contact-card-icon" style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#ccc"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            </div>
            <div class="contact-card-info">
              <div class="contact-card-label">GitHub</div>
              <div class="contact-card-value">Prashant-core</div>
            </div>
            <span class="contact-card-arrow">↗</span>
          </a>

          <a href="{{ portfolio.linkedin }}" target="_blank" class="contact-card glass-card">
            <div class="contact-card-icon" style="background:rgba(10,102,194,0.15);border-color:rgba(10,102,194,0.3);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#0a66c2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </div>
            <div class="contact-card-info">
              <div class="contact-card-label">LinkedIn</div>
              <div class="contact-card-value">prashant-kumar</div>
            </div>
            <span class="contact-card-arrow">↗</span>
          </a>

        </div>
      </div>

      <form class="contact-form" id="contact-form" action="/contact" method="POST">
        <div class="form-group">
          <input type="text" name="name" placeholder="Your Name" required />
        </div>
        <div class="form-group">
          <input type="email" name="email" placeholder="Your Email" required />
        </div>
        <div class="form-group">
          <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        </div>
        <button type="submit" class="btn-primary full-width">Send Message</button>
        <div id="form-status"></div>
      </form>
    </div>
  </div>
</section>
