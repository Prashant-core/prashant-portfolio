<section class="contact section" id="contact">
  <div class="container" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <div class="section-tag">Contact</div>
    <h2 class="section-title">Send a message.</h2>
    <p class="contact-desc" style="margin-bottom: 40px; color: #94a3b8;">
      Have a project in mind, a question, or just want to say hi? My inbox is always open.
    </p>

    <form class="contact-form" id="contact-form" action="/contact" method="POST" style="text-align: left;">
      <div class="form-group">
        <input type="text" name="name" placeholder="Your Name" required />
      </div>
      <div class="form-group">
        <input type="email" name="email" placeholder="Your Email" required />
      </div>
      <div class="form-group">
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      </div>
      <button type="submit" class="btn-primary full-width">Send Message</button>
      <div id="form-status"></div>
    </form>
  </div>
</section>
