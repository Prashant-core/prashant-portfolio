<section class="github-stats section" id="github">
  <div class="container">
    <div class="section-tag">open source</div>
    <h2 class="section-title">GitHub <span class="gradient-text">Activity</span></h2>

    <div class="github-grid">

      <!-- GitHub Stats Card -->
      <div class="github-card" id="gh-stats-card">
        <div class="gh-card-header">
          <div class="gh-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          </div>
          <span class="gh-card-title">GitHub Stats</span>
          <span class="gh-username">@Prashant-core</span>
        </div>
        <div class="gh-stats-grid" id="gh-stats-grid">
          <div class="gh-stat-item">
            <div class="gh-stat-num" id="gh-repos">—</div>
            <div class="gh-stat-label">Repositories</div>
          </div>
          <div class="gh-stat-item">
            <div class="gh-stat-num" id="gh-followers">—</div>
            <div class="gh-stat-label">Followers</div>
          </div>
          <div class="gh-stat-item">
            <div class="gh-stat-num" id="gh-following">—</div>
            <div class="gh-stat-label">Following</div>
          </div>
          <div class="gh-stat-item">
            <div class="gh-stat-num" id="gh-stars">—</div>
            <div class="gh-stat-label">Total Stars</div>
          </div>
        </div>
        <div class="gh-loading" id="gh-loading">
          <div class="gh-spinner"></div>
          <span>Fetching GitHub data...</span>
        </div>
      </div>

      <!-- Most Used Languages -->
      <div class="github-card">
        <div class="gh-card-header">
          <div class="gh-icon">⚡</div>
          <span class="gh-card-title">Top Languages</span>
        </div>
        <div class="gh-langs" id="gh-langs">
          <div class="gh-lang-loading">Loading...</div>
        </div>
      </div>

      <!-- Contribution streak image from github-readme-stats -->
      <div class="github-card gh-wide">
        <div class="gh-card-header">
          <div class="gh-icon">📊</div>
          <span class="gh-card-title">Contribution Graph</span>
        </div>
        <div class="gh-contrib-wrap">
          <img
            src="https://github-readme-activity-graph.vercel.app/graph?username=Prashant-core&bg_color=1a1a24&color=a78bfa&line=7c3aed&point=ec4899&area=true&hide_border=true"
            alt="GitHub Activity Graph"
            class="gh-contrib-img"
            onerror="this.parentElement.innerHTML='<p class=gh-fallback>View full activity on <a href=https://github.com/Prashant-core target=_blank>GitHub ↗</a></p>'"
          />
        </div>
      </div>

    </div>
  </div>
</section>
