  <script>
    (function() {
      // --- LOAD DARK THEME VIDEO (Galaxy) ---

      const srcDark = 'https://stream.mux.com/Aa02T7oM1wH5Mk5EEVDYhbZ1ChcdhRsS2m1NYyx4Ua1g.m3u8';
      
      if (Hls.isSupported()) {
        const hlsDark = new Hls({ autoStartLoad: true, startLevel: -1 });

        hlsDark.on(Hls.Events.MANIFEST_PARSED, function() { videoDark.play().catch(() => {}); });
      } else if (videoDark.canPlayType('application/vnd.apple.mpegurl')) {
        videoDark.src = srcDark;
        videoDark.play().catch(() => {});
      }

      // --- LOAD LIGHT THEME VIDEO (Cubes) ---
