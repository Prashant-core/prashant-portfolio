<section class="github-stats section" id="github">
  <div class="container">
    <div class="section-tag">open source</div>
    <h2 class="section-title">GitHub <span class="gradient-text">Activity</span></h2>

    <div class="gh-bento-grid">

      <!-- Profile + Stats -->
      <a href="https://github.com/Prashant-core" target="_blank" class="gh-profile-card glass-card">
        <div class="gh-profile-top">
          <img src="/static/images/profile.jpg" alt="Prashant Kumar" class="gh-avatar"/>
          <div>
            <div class="gh-profile-name">Prashant Kumar</div>
            <div class="gh-profile-handle">@Prashant-core</div>
          </div>
          <div class="gh-visit-badge">Visit GitHub ↗</div>
        </div>
        <div class="gh-stats-row" id="gh-stats-row">
          <div class="gh-stat-box">
            <div class="gh-stat-num" id="gh-repos">—</div>
            <div class="gh-stat-lbl">Repos</div>
          </div>
          <div class="gh-stat-box">
            <div class="gh-stat-num" id="gh-followers">—</div>
            <div class="gh-stat-lbl">Followers</div>
          </div>
          <div class="gh-stat-box">
            <div class="gh-stat-num" id="gh-stars">—</div>
            <div class="gh-stat-lbl">Stars</div>
          </div>
          <div class="gh-stat-box">
            <div class="gh-stat-num" id="gh-following">—</div>
            <div class="gh-stat-lbl">Following</div>
          </div>
        </div>
        <div class="gh-loading-row" id="gh-loading">
          <div class="gh-spinner"></div>
          <span>Loading GitHub data...</span>
        </div>
      </a>

      <!-- Top Languages -->
      <div class="gh-lang-card glass-card">
        <div class="gh-card-title">
          <span class="gh-card-icon">⚡</span> Top Languages
        </div>
        <div id="gh-langs"><div class="gh-loading-row"><div class="gh-spinner"></div><span>Loading...</span></div></div>
      </div>

      <!-- Contribution Graph — full width -->
      <div class="gh-contrib-card glass-card">
        <div class="gh-card-title">
          <span class="gh-card-icon">📊</span> Contribution Graph
          <a href="https://github.com/Prashant-core" target="_blank" class="gh-contrib-link">View on GitHub ↗</a>
        </div>
        <canvas id="gh-contrib-canvas" class="gh-contrib-canvas"></canvas>
        <div class="gh-contrib-loading" id="gh-contrib-loading">
          <div class="gh-spinner"></div><span>Loading contributions...</span>
        </div>
      </div>

    </div>
  </div>
</section>
