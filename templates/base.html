<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prashant Kumar | AI Engineer · NETworq · Deepfake Detection</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2314b8a6'/><text x='50' y='50' dominant-baseline='central' text-anchor='middle' font-size='60' font-family='sans-serif' font-weight='bold' fill='%23ffffff'>P</text></svg>" />

  <meta name="description" content="Prashant Kumar — AI & ML Engineer. Building AI that actually works in the real world." />
  <meta property="og:title" content="Prashant Kumar — AI & ML Engineer" />
  <meta property="og:description" content="Final year B.Tech student building real-world AI. Check out NETworq and Deepfake Detection." />
  <meta property="og:image" content="/static/images/profile.jpg" />
  <meta property="og:url" content="https://prashant-portfolio-nine.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Prashant Kumar — AI & ML Engineer" />
  <meta name="twitter:description" content="Building AI that solves real problems. NETworq, Deepfake Detection & more." />
  <meta name="twitter:image" content="/static/images/profile.jpg" />

  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">

      <a href="#" class="nav-logo">
        <img src="/static/images/profile.jpg" alt="Prashant Kumar" class="nav-profile-pic" />
        <span class="nav-name">Prashant<span class="dot">.</span></span>
      </a>

      <ul class="nav-links" id="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>

      <div class="nav-right">
        <a href="#contact" class="nav-cta">Hire Me</a>

        <!-- THEME TOGGLE — top right, beside Hire Me -->
        <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle theme" title="Toggle light/dark mode">
          <span class="theme-icon" id="themeIcon">
            <!-- Moon icon (default dark mode) -->
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <!-- Sun icon (light mode) -->
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </span>
        </button>

        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

    </div>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobile-menu">
      <ul>
        <li><a href="#about" onclick="closeMobileMenu()">About</a></li>
        <li><a href="#skills" onclick="closeMobileMenu()">Skills</a></li>
        <li><a href="#projects" onclick="closeMobileMenu()">Projects</a></li>
        <li><a href="#contact" onclick="closeMobileMenu()">Contact</a></li>
        <li><a href="#contact" class="mobile-cta" onclick="closeMobileMenu()">Hire Me</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- BACK TO TOP -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="site-footer-inner">

      <!-- LEFT: socials + separator + views -->
      <div class="footer-left">
        <div class="footer-social-icons">
          <a href="https://x.com" target="_blank" aria-label="X / Twitter" class="footer-icon-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.261 5.632 5.903-5.632Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </a>
          <a href="{{ portfolio.github }}" target="_blank" aria-label="GitHub" class="footer-icon-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
          </a>
          <a href="{{ portfolio.linkedin }}" target="_blank" aria-label="LinkedIn" class="footer-icon-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
        </div>
        <div class="footer-separator"></div>
        <div class="footer-views">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span id="view-count">—</span>
          <span class="footer-views-label">VIEWS</span>
        </div>
      </div>

      <!-- RIGHT: witty line + copyright -->
      <div class="footer-right">
        <div class="footer-made-with">Made with Python, FastAPI &amp; pure panic.</div>
        <div class="footer-copy">© <span id="footer-year"></span> Prashant Kumar. All rights reserved.</div>
      </div>

    </div>
  </footer>

  <div class="theme-circle-overlay" id="themeCircle"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/animation.js"></script>
</body>
</html>
